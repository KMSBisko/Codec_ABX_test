version: '3.8'

services:
  abx-web:
    build: .
    container_name: codec-abx-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - MAX_CONTENT_LENGTH=209715200   # 200 MB max upload
    volumes:
      # Persist uploaded audio & processed files across restarts
      - uploads_data:/app/web/uploads
      - sessions_data:/app/web/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  uploads_data:
  sessions_data: